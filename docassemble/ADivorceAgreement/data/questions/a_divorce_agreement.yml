#################### Interview order #####################
comment: |
  Controls order and branching logic for questions specific to this form
id: interview_order_a_divorce_agreement
code: |
  # Set the allowed courts for this interview
  allowed_courts = ['Probate and Family Court']
  nav.set_section("review_a_divorce_agreement")
  user_role = "plaintiff"
  user_ask_role = "plaintiff"
  users.gather()
  set_parts(subtitle=str(users))
  A_Divorce_Agreement
  has_no_children
  if has_children: 
    children.gather()
    custody_custom_terms
    parenting_time_assigned
    health_insurance_provided_for_children
    education_cost_based_on_ability
    child_tax_claim_single_party
    users1_life_insurance_required
  set_progress(14)  
  health_insurance_self_responsible
  alimony_waived_all
  if not alimony_waived_all:
    alimony_payment_agreed
    if alimony_payment_agreed:
        alimony_payer
        alimony_recipient
        alimony_amount_value
        alimony_frequency
        alimony_due_on
        alimony_end_date
        alimony_custom_description
    
  
  taxes_file_separately
  
  no_real_estate 
  if not no_real_estate:
    real_estate_address
    real_estate_current_owner
    real_estate_county
    real_estate_book
    real_estate_page
    real_estate_transfer

    if real_estate_transfer:
        real_estate_owner_name
        real_estate_waiver_party
        real_estate_cost_responsible
        real_estate_start_date

    real_estate_custom_terms
    if real_estate_custom_terms:
        real_estate_custom_description

  set_progress(28)
  personal_property_already_divided
  no_marital_debt
  if not no_marital_debt: 
    marital_debt_custom_terms
    if marital_debt_custom_terms: 
      marital_debt_custom_description
  
  individual_debt_responsible_each
  if not individual_debt_responsible_each: 
    users[0].debt_listed
    other_parties[0].debt_listed
    
    
  no_retirement_benefits
  no_life_insurance
  agreement_merge_fully
  users1_initials
  set_progress(42)
  trial_court.division
  other_parties[0].address.address
  other_parties.gather()
  set_progress(56)
  users[0].address.address
  signature_date
  docket_number
  interview_order_a_divorce_agreement = True
