# ALDocument objects specify the metadata for each template
objects:
  - a_divorce_agreement_Post_interview_instructions: ALDocument.using(title="Instructions", filename="a_divorce_agreement_next_steps.docx", enabled=True, has_addendum=False)
  - a_divorce_agreement_attachment: ALDocument.using(title="1A Divorce Agreement", filename="a_divorce_agreement", enabled=True, has_addendum=False, )
---
# Bundles group the ALDocuments into separate downloads, such as for court and for the user
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[a_divorce_agreement_Post_interview_instructions, a_divorce_agreement_attachment], filename="a_divorce_agreement", title="All forms to download for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=[a_divorce_agreement_attachment],  filename="a_divorce_agreement", title="All forms to deliver to court", enabled=True)
---
# Each attachment defines a key in an ALDocument. We use `i` as the placeholder here so the same template is 
# used for "preview" and "final" keys, and logic in the template checks the value of 
# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: a_divorce_agreement_next_steps
  docx template file: a_divorce_agreement_next_steps.docx
  variable name: a_divorce_agreement_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
