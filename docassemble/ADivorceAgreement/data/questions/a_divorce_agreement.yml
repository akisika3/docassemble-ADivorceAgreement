---
id: 1A Divorce Agreement
question: |
  1A Divorce Agreement
continue button field: A_Divorce_Agreement
---
id: Children
question: |
  Children
fields:
  - We do not have minor children together: has_no_children
    datatype: yesno
  - "We do have minor children together": has_children
    datatype: yesno
---
id: child info 
question: | 
    Tell us about your child(ren)
fields: 
  - "What is your child's first name?": children[i].name.first
  - "What is your child’s date of birth?": children[i].birthdate
    datatype: date
---
id: Child Custody 
question: |
  Custody Type
subquestion: |
  Choose the custody arrangement you and your spouse have agreed to.
fields:
  - "Please select one custody arrangement:": custody_type_choice
    datatype: radio
    choices:
      - Joint legal and physical custody
      - Joint legal custody, one parent has physical custody
      - One parent has sole legal and physical custody

  - "Who will have sole custody of the child(ren)?": sole_custody_holder
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: custody_type_choice
      is: "One parent has sole legal and physical custody"

  - "Do you have custom terms for custody?": custody_custom_terms
    datatype: yesnoradio

  - "Describe your custom custody arrangement:": custody_custom_description
    show if: custody_custom_terms
---
code: |
  custody_joint_legal_physical = (custody_type_choice == "Joint legal and physical custody")
  custody_joint_legal_split_physical = (custody_type_choice == "Joint legal custody, one parent has physical custody")
  custody_sole = (custody_type_choice == "One parent has sole legal and physical custody")

--- 
id: Parenting time
question: | 
  Parenting Time 
fields: 
  - "Have you and your spouse agreed on a parenting time schedule?": parenting_time_assigned
    input type: dropdown
    choices: 
      - Yes
      - No 
  - "Which parent will have scheduled parenting time with the child or children?": parenting_time_recipient
    input type: dropdown
    choices:
      - Party A
      - Party B
  - "Describe the parenting time arrangement": parenting_time_description
  - "Have you and your spouse made a separate schedule for parenting time, holidays, or vacations?": parenting_time_attached_schedule
    input type: dropdown
    choices: 
      - Yes
      - No
