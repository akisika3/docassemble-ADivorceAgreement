id: Real Estate Custom Terms
question: | 
  Real Estate Custom terms
fields:
  - "We have additional terms to divide real estate": real_estate_custom_terms
    datatype: yesno

  - "Describe your real estate agreement": real_estate_custom_description
    show if:
      variable: real_estate_custom_terms
      is: True

