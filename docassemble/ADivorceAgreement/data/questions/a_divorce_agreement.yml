id: Personal Property
question: | 
  Personal Property
fields: 
  - "Did you already divide your personal property": personal_property_already_divided
    datatype: button
    choices: 
      - We already divided our personal property: True
      - We have not yet divided personal property: False

  - "Do you and your spouse have personal property to divide?": personal_property_divide_plan
    datatype: button
    choices: 
      - We have personal property to divide: True
      - We do not have personal property to divide: False  
    show if: 
      variable: personal_property_already_divided
      is: False 
  - "Describe how you will divide perosnal property": personal_property_divide_description
    datatype: text
    show if: 
      variable: personal_property_divide_plan
      is: True
  - "Date of Personal property divide": personal_property_divide_date
    datatype: date
    show if: 
      variable: personal_property_divide_plan
      is: True
