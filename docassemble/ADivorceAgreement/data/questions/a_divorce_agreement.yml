---
id: Health Insurance
question: |
  Health Insurance
fields: 
  - "Will each of you be responsible for your own health insurance?": health_insurance_self_responsible
    input type: dropdown
    choices: 
      - Yes
      - No 

  - "Will each of you be responsible for paying your own uninsured medical, dental, and vision expenses?": uninsured_expenses_self_responsible
    datatype: dropdown
    choices: 
      - Yes
      - No

  - "Who will get the health insurance coverage from the other spouse?": health_insurance_recipient_adult
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if: 
      variable: health_insurance_self_responsible
      is: No

  - "Which spouse will provide health insurance for the other?": health_insurance_provider_adult
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if: 
      variable: health_insurance_self_responsible
      is: No 

  - "What type of health insurance will be provided for the other spouse?": health_insurance_types_adult
    datatype: checkboxes
    choices:
      - Medical
      - Dental
      - Vision
    show if:
      variable: health_insurance_self_responsible
      is: No

  - "If there is an extra cost to keep one spouse on the other's health insurance, have you agreed that the coverage can continue as long as someone pays the added cost?": health_insurance_with_cost_allowed
    datatype: dropdown
    choices: 
      - Yes 
      - No
    show if: 
      variable: health_insurance_self_responsible
      is: No

  - "If there’s an extra cost to keep one spouse on health insurance, who will pay that extra cost?": health_insurance_cost_payer_adult
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if: 
      variable: health_insurance_self_responsible
      is: No

  - "Do you have custom terms for either Party's health insurance coverage?": health_insurance_custom_terms_adult
    datatype: yesno

  - "What are the specific details of the health insurance agreement between you and your spouse?": health_insurance_custom_description_adult
    show if:
      variable: health_insurance_custom_terms_adult
      is: Yes 
---
--- 
id: Children Health Insurance
question: | 
  Children Health Insurance
fields: 
  - "We agree on how to provide health insurance for the children": health_insurance_provided_for_children
    datatype: yesno
  - "We agree to provide health insurance for the the children until they are emancipated ": health_insurance_until
    datatype: yesno
  - "Which parent will provide health insurance for the child or children?": health_insurance_provider_children
    input type: dropdown
    choices:
      - Party A
      - Party B
  - "Will the child(ren) be on a MassHealth or a private plan?": health_insurance_types_children
    input type: dropdown
    choices:
      - MassHealth
      - Private Plan
  - "Will you and your spouse split the cost of your children’s uninsured medical or dental bills 50/50?": uninsured_expenses_split_children
    input type: dropdown
    choices: 
      - Yes
      - No
  - "Do you have custom terms for the child(ren)'s health insurance?": health_insurance_custom_terms_children
    datatype: yesno
  - "What is the agreement for the child(ren)'s health insurance coverage?": health_insurance_custom_description_children
---
id: Education
question: |
  College or Trade School Costs
fields:
  - "We agree to split college or trade school costs evenly": education_cost_based_on_ability 
    datatype: yesno
      
  - "Do you have custom terms for education expenses?": education_custom_terms
    input type: dropdown
    choices: 
      - Yes
      - No
      
  - "Describe your agreement about college or trade school expenses:": education_custom_description
    show if: 
      variable: education_custom_terms
      is: True
---
id: Alimony
question: |
  Alimony
fields:
  - "We do not want alimony now or in the future": alimony_waived_all
    datatype: yesno

  - "One party will pay alimony to the other": alimony_payment_agreed
    datatype: yesno
    show if:
      variable: alimony_waived_all
      is: False

  - "Who will be paying alimony?": alimony_payer
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: alimony_payment_agreed
      is: True

  - "Who will receive alimony payments?": alimony_recipient
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: alimony_payment_agreed
      is: True

  - "Alimony amount value": alimony_amount_value
    datatype: currency
    min: 0
    show if:
      variable: alimony_payment_agreed
      is: True

  - "How often will alimony payments be made?": alimony_frequency
    input type: dropdown
    choices:
      - Weekly
      - Biweekly
      - Monthly
      - Other
    show if:
      variable: alimony_payment_agreed
      is: True

  - "What day will alimony payments be due?": alimony_due_on
    input type: dropdown
    choices:
      - Every Friday
      - First day of each month
    show if:
      variable: alimony_payment_agreed
      is: True

  - "If alimony will end on a specific date (instead of when someone remarries or passes away), what is that date?": alimony_end_date
    datatype: date
    show if:
      variable: alimony_payment_agreed
      is: True

  - "What is your alimony agreement?": alimony_custom_description
    datatype: area
    show if:
      variable: alimony_payment_agreed
      is: True
---
id: Taxes
question: |
  Taxes
fields:
  - "We agree to file taxes separately from now on": taxes_file_separately
    datatype: yesno

  - "We have filed and paid all taxes during the marriage": taxes_fully_reported
    datatype: button
    choices: 
      - Yes: True
      - No: False

  - "Do you have unpaid tax debt?": tax_debt_responsibility_set
    datatype: button
    choices: 
      - Yes: True
      - No: False
    show if:
      variable: taxes_fully_reported
      is: False

  - "Who will be responsible for the tax debt?": tax_debt_responsible_party
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: tax_debt_responsibility_set
      is: True
  - "We want the court to know additional terms to our tax agreement": taxes_custom_terms
    datatype: yesno
  - "What is your agreement for taxes?": taxes_custom_description
    show if: 
      variable: taxes_custom_terms
      is: True 
---
id: Children Tax
question: | 
  Children tax
fields: 
  - "Have you agreed that one parent will claim the child or children on taxes every year? If yes, which parent?": child_tax_claim_single_party
    input type: dropdown
    choices:
      - Party A
      - Party B
      - N/A
  - "Which parent will claim the child(ren) on their taxes every year?": child_tax_single_party
    input type: dropdown
    choices:
      - Party A
      - Party B
  - "Have you agreed that each of you will take turns claiming the child or children on taxes in alternating years?": child_tax_claim_split_years
    datatype: yesno
  - "Which parent will claim the child or children on their taxes in odd-numbered years?": child_tax_odd_year_party
    input type: dropdown
    choices:
      - Party A
      - Party B
      - N/A
  - "Which parent will claim the child or children on their taxes in even-numbered years?": child_tax_even_year_party
    input type: dropdown
    choices:
      - Party A
      - Party B
      - N/A
  - "Do you have custom terms for claiming the child(ren) on taxes?": child_tax_claim_custom_terms
    datatype: yesno
  - "What custom agreement have you made about who will claim the child or children on tax returns?": child_tax_claim_custom_description
