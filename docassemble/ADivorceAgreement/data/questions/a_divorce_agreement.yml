id: Debts and Liabilities
question: |
  Debts and Liabilities
fields:
  - "Do you have shared debts or liabilities from the marriage?": no_marital_debt
    input type: buttons
    choices: 
      - Yes: True
      - No: False 
  - "Do you agree on how to pay shared debts and liabilities?": debt_custom_terms
    input type: buttons
    choices: 
      - Yes: True
      - No: False
    show if: 
      variable: no_marital_debt
      is: True
  - "What is your agreement for debts and liabilities?": debt_custom_description
    show if: 
      variable: debt_custom_terms
      is: Yes
  - "Will you each pay debts in our own name?": individual_debt_responsible_each
    input type: buttons
    choices: 
      - Yes: True
      - No: False
  - "Does Party A have debts or liabilities?": users[0].debt_listed
    input type: dropdown
    choices:
      - Yes
      - No   
    show if: 
      variable: individual_debt_responsible_each
      is: False
  - "What debts and liabilities will Party A be responsible for?": users[0].debt_description
    show if: 
      variable: users[0].debt_listed
      is: True 
  - "Does Party B have debts or liabilities?": other_parties[0].debt_listed
    input type: button
    choices: 
      - Yes: True
      - No: False
    show if:
      variable: individual_debt_responsible_each
      is: No
  - "If Party B has debts and liabilities, what are they?": other_parties[0].debt_description
    show if: 
      variable: other_parties[0].debt_listed
      is: Yes
