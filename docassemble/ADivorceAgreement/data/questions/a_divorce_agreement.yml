id: Marital Property Ownership
question: |
  Real Estate Ownership
fields:
  - "Do you own real estate?": no_real_estate
    datatype: button
    choices: 
      - We have no real estate: True
      - We have real estate: False 
---
id: Property Details
question: | 
  Address and Information
fields: 
  - "What is the full address of the property?": real_estate_address

  - "Whose name is currently on the deed?": real_estate_current_owner
    input type: dropdown
    choices:
      - Party A
      - Party B
      - Both

  - "What county is the property located in?": real_estate_county
    input type: dropdown
    choices:
      - Barnstable
      - Bristol
      - Essex
      - Middlesex
      - Suffolk

  - "Book number": real_estate_book

  - "Page number": real_estate_page
---
id: real_estate_transfer
question: |
  Transfer of Property
fields:
  - "Will either party keep the property?": real_estate_transfer
    datatype: button
    choices: 
      - One of us will keep the property: True
      - We will sell the property: False

  - "Who will keep the property?": real_estate_owner_name
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: real_estate_transfer
      is: True

  - "Is a party waiving interest?": real_estate_waiver_party
    input type: dropdown
    choices:
      - No
      - Party A
      - Party B
    show if:
      variable: real_estate_transfer
      is: True

  - "Who pays ongoing costs?": real_estate_cost_responsible
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: real_estate_transfer
      is: True

  - "When does responsibility begin?": real_estate_start_date
    datatype: date
    show if:
      variable: real_estate_transfer
      is: True
