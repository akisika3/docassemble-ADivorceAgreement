id: A_Divorce_Agreement
continue button field: a_divorce_agreement_intro
question: |
  1A Divorce Agreement
subquestion: |
  This interview will help you 1A Divorce Agreement.

 
    Learn more about divorce at: https://www.mass.gov/info-
    details/massachusetts-law-about-divorce
  
 
  Before you get started, please gather:
  
  1. Basic Information
      - Full legal names, home addresses, birth dates of spouses and children
      - Name of court and docket number
  2. Financial Information
      - Information about each spouses income and expenses
      - Recent statements for bank accounts
      - Information about retirement accounts
      - List of all debts (credit cards, loans, medical bills, tax debts, etc.)
  
  3. Agreements you have made
      - How you will divide your property and debts
      - Any alimony you have agreed to
      - How you will handle health insurance coverage after divorce
  4. ** If you have any unemancipated children **
      - Your proposed custody and parenting time schedule
      - Child support, including amount calculated by the Massachusetts Child Support Guidelines
      - How health insurance will be provided for the children
      - How you will share college and extracurricular costs
  
  When you are finished, you will need to:
  
  1. File your agreement with the court
  2. File a 1A petition with the court
  3. File a Financial Statement for each spouse
  4. Attach your Parenting Plan if you have one

  If you are a  co-petitioner, you can use this interview to complete and file a 1A agreement.

  Most people take about 1 hour to complete this interview.
