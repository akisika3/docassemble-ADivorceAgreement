id: Child Custody 
question: |
  Custody Type
subquestion: |
  <div markdown="0">
    <p>Choose the custody arrangement you and your spouse agree to.</p>
    <p>There are 4 types of custody arrangements. 
  Click on the arrows to learn more about each:</p>

    <details>
      <summary>(1) Sole legal custody</summary>
      One parent has the right and responsibility to make major decisions about the child, including education, medical care, religion, and emotional development.
    </details>

    <details>
      <summary>(2) Shared legal custody</summary>
      All parents are involved in and responsible for major decisions about the child, including education, medical care, and emotional, moral, and religious development.
    </details>

    <details>
      <summary>(3) Sole physical custody</summary>
      A child lives with one parent and the other parent(s) has reasonable parenting time unless the court decides otherwise.
    </details>

    <details>
      <summary>(4) Shared physical custody</summary>
      A child has periods living with each parent, maintaining frequent and regular contact with both.
    </details>
  </div>
 
  Learn more at: https://www.mass.gov/info-details/learn-about-the-types-of-child-custody-arrangements 
fields:
  - "Please select one custody arrangement:": custody_type_choice
    datatype: radio
    choices:
      - Joint legal and physical custody
      - Joint legal custody, but one parent has primary physical custody
      - Sole legal and physical custody

  - "Who will have custody of the child(ren)?": sole_custody_holder
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: custody_type_choice
      is: "Sole legal and physical custody" 
  - "Who will have custody of the child(ren)?": sole_custody_holder
    input type: dropdown
    choices:
      - Party A
      - Party B
    show if:
      variable: custody_type_choice
      is: "Joint legal custody, but one parent has physical custody" 


  - "Do you have additional custody terms you agree to?": custody_custom_terms
    datatype: yesnoradio

  - "Give a detailed description of your custody arrangement": custody_custom_description
    show if: custody_custom_terms
---
