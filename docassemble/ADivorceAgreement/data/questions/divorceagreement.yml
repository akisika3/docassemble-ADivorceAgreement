id: Children Life Insurance
question: | 
  Children Life Insurance
subquestion: | 
  
  Most insurance companies will not pay life insurance proceeds to minors. If 
  any of your children are minors, one of your options is to designate a trust
  as the beneficiary, with an individual or institution to use the funds for
  the welfare of your children. Trusts can be set up by your family attorney.
  Another option is to designate two individuals whom you trust as
  beneficiaries, who will make joint decisions about the care and welfare of
  your children.

  Learn more at: https://www.mass.gov/info-details/life-insurance-basics
