id: Children Health Insurance agreement
question: |
  Children's Health Insurance
subquestion: | 
  The Court shall enter an order that requires either parent to provide health 
  care coverage if such coverage is available at reasonable cost and 
  accessible to the child. If the Court determines that an order for health 
  care coverage is not in the best interest of the child or creates an undue 
  hardship for either parent, then the Court shall enter written findings.
  
  
  If a parent has enrolled a child in MassHealth, or an equivalent program in 
  another state that is substantially similar to the program established in G. 
  L. c. 118E, the Court shall order that parent to maintain such coverage as 
  long as the child remains eligible; provided, however, that the Court may
  also order the other parent to enroll the child in private health insurance 
  if:
    - private health insurance is available to that parent at reasonable cost
      and accessible to the child;
    - enrollment in the insurance is in the best interest of the child; and
      enrollment in the insurance will not create an undue hardship for either
      parent.

  Learn more at: https://www.mass.gov/info-details/2025-child-support-guidelines-section-ii-factors-to-be-considered-in-setting-the-child-support-order#f-child-support-for-children-between-the-ages-of-18-and-23
 
  H. Health Care Coverage 
