id: Parenting time
question: | 
  Parenting Time 
subquestion: | 
  Parenting time lets a parent who doesn't have primary physical custody spend time with or visit their child. The parents’ court-approved agreement says where the visits will happen and for how long, and whether or not the visits need to be supervised by another adult. If the parents can't agree on terms, the court will decide
  
  Some important things that the court will consider are:
   
    - The child's well-being
    
    - How the child is doing in school and the community
   
    - The child’s relationship with the parents and other family members
    
    - The parents’ history of abuse, drug use, or abandonment
   
    - Whether one parent has been the primary caregiver in the past
   
    - Depending on the age and maturity of the child, the child’s preference, 
    although this is never the deciding factor

  Learn more at: https://www.mass.gov/child-custody-and-parenting-time 
fields: 
  - "Do you have a parenting time arrangement?": parenting_time_assigned
    datatype: yesnoradio
  - "Who will have parenting time with the child(ren)?": parenting_time_recipient
    input type: radio
    choices:
      - Party A
      - Party B
    show if: 
      variable: parenting_time_assigned
      is: True
  - "What is the the parenting time schedule?": parenting_time_description
    input type: area
    show if: 
      variable: parenting_time_assigned
      is: True
  - "Do you have a schedule for special occasions, holidays, or vacations to add as an attachment to this agreement?": parenting_time_attached_schedule
    input type: radio
    choices: 
      - Yes
      - No
    show if:
      variable: parenting_time_assigned
      is: True
