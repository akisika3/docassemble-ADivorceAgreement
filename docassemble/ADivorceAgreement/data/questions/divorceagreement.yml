id: Children
question: |
  Children
subquestion: | 
  The court may make appropriate orders of maintenance, support and education 
  of any child who has attained age eighteen but who has not attained age 
  twenty-one and who is domiciled in the home of a parent, and is principally
  dependent upon said parent for maintenance. 
  
  The court may make appropriate orders of maintenance, support and education
  for any child who has attained age twenty-one but who has not attained age 
  twenty-three, if such child is domiciled in the home of a parent, and is 
  principally dependent upon said parent for maintenance due to the enrollment 
  of such child in an educational program, excluding educational costs beyond 
  an undergraduate degree.

  Learn more at: https://www.mass.gov/info-details/massachusetts-law-about-child-support-over-age-18 
