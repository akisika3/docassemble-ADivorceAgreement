id: Education
question: |
  College or Trade School Costs
subquestion: | 
  The Court will consider: 
    - Cost of the post-secondary education
    
    - Child’s abilities
   
    - Where the child lives while contribution is being ordered
   
    - Available resources of all parents and the child and affordability
  
    - Any other relevant factors.

  No parent will be ordered to pay more than fifty percent of 
  the undergraduate, in-state resident costs of the University of 
  Massachusetts- Amherst, unless the Court enters written findings that a 
  parent has the ability to pay a higher amount.  
  
  This section applies to all orders requiring parental contribution to post-
  secondary educational expenses, regardless of where the child resides or
  attends school.

  Learn more at: https://www.mass.gov/info-details/2025-child-support-guidelines-section-ii-factors-to-be-considered-in-setting-the-child-support-order#f-child-support-for-children-between-the-ages-of-18-and-23

