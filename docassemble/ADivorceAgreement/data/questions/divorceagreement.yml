id: Taxes
question: |
  Taxes
subquestion: |
  If the judgment nisi is in effect at the close of the tax year, the taxpayer is married and must file either jointly or as married filing separately. If the judgment nisi has then become absolute, the taxpayer's filing status is "single".

  If you're changing from married filing joint to married filing separately, you and your spouse may file separate returns before the due date of the original return even if you already filed a joint return for the tax year.

  Learn more at: https://www.mass.gov/info-details/filing-status-on-massachusetts-personal-income-tax

