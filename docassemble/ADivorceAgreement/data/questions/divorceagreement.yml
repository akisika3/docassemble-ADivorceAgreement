    In Massachusetts your health insurance can only be cancelled for non-
    payment of premium or fraud.

    You can only enroll in a new health plan during the regular annual open
    enrollment period each fall or through a special enrollment process if you
    have experienced some type of qualifying event (for instance, you just
    moved to Massachusetts or you are getting divorced. 

    You may apply for MassHealth at any time during the year. You DO NOT need
    an open enrollment waiver from OPP to apply for MassHealth.

    Learn more at: https://www.mass.gov/info-details/health-care-reform-for-individuals

       Request an open enrollment waiver at: https://www.mass.gov/info-
    details/request-an-open-enrollment-waiver

