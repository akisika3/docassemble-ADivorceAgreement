id: Child Tax Claim
question: | 
  Children Tax Claim
subquestion: | 
  You may be able to claim the child and family credit on your Massachusetts
  personal income tax return if you're taking care of a child.
  
  Starting with tax years beginning on January 1, 2024, a
  noncustodial parent may claim the credit for a child dependent
  who is age 13 or older and who is physically or mentally incapable of
  caring for themself.

  Learn more at: https://www.mass.gov/info-details/massachusetts-child-and-family-tax-credit 
