id: Alimony
question: |
  Alimony
subquestion: | 
  Alimony is paid by a spouse who has the ability to pay to a
  spouse in need of support for a period of time.
  
  Judges look at a few different factors to decide whether and
  how much alimony to award:

    - How long the marriage was
    - How old the parties are
    - The parties’ health 
    - Both parties’ income, employment, and employability, 
      including whether they could be employable with reasonable
      effort and more training, if necessary
    - Both parties’ economic and non-economic contribution to 
      the marriage
    - The parties’ way of life during the marriage 
    - Each person’s ability to continue the way of life they had
      during the marriage
    - Lost economic opportunity because of the marriage
    - Other factors the court thinks are relevant

  Learn more at: https://www.mass.gov/alimony

fields:
  - "We do not want alimony now or in the future": alimony_waived_all
    datatype: yesno

  - "One party will pay alimony to the other": alimony_payment_agreed
    datatype: yesno
    show if:
      variable: alimony_waived_all
      is: False

  - "Who will be paying alimony?": alimony_payer
    input type: radio
    choices:
      - Party A
      - Party B
    show if:
      variable: alimony_payment_agreed
      is: True

  - "Who will receive alimony payments?": alimony_recipient
    input type: radio
    choices:
      - Party A
      - Party B
    show if:
      variable: alimony_payment_agreed
      is: True

  - "Alimony amount value": alimony_amount_value
    datatype: currency
    min: 0
    show if:
      variable: alimony_payment_agreed
